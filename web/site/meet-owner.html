<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Space Grotesk';font-weight:700;src:url('fonts/spacegrotesk-700.woff2') format('woff2')}
@font-face{font-family:'Inter';font-weight:500;src:url('fonts/inter-500.woff2') format('woff2')}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06080f}
.b{position:relative;width:1200px;height:630px;overflow:hidden;
  background:radial-gradient(1100px 720px at 50% -18%,#13234a 0%,transparent 60%),
             radial-gradient(820px 560px at 100% 8%,#1c1440 0%,transparent 55%),
             radial-gradient(760px 540px at 0% 96%,#08213a 0%,transparent 55%),#06080f;
  font-family:'Inter',system-ui,sans-serif}
.aur{position:absolute;border-radius:50%;filter:blur(98px);opacity:.5;z-index:0}
.a1{width:520px;height:520px;background:radial-gradient(circle,#22d3ee,transparent 64%);top:-200px;left:-90px}
.a2{width:480px;height:480px;background:radial-gradient(circle,#a78bfa,transparent 64%);bottom:-220px;right:-60px}
.a3{width:420px;height:420px;background:radial-gradient(circle,#38bdf8,transparent 64%);bottom:-160px;left:30%;opacity:.28}
.grid{position:absolute;inset:0;z-index:0;opacity:.06;
  background-image:linear-gradient(#9fb4d8 1px,transparent 1px),linear-gradient(90deg,#9fb4d8 1px,transparent 1px);
  background-size:54px 54px;-webkit-mask-image:radial-gradient(940px 620px at 50% 45%,#000,transparent 82%)}
.wrap{position:relative;z-index:1;height:100%;display:flex;align-items:center;gap:60px;padding:0 78px}
.pf{width:392px;height:392px;flex:none;border-radius:50%;padding:5px;
  background:linear-gradient(135deg,#22d3ee 0%,#38bdf8 46%,#a78bfa 100%);
  box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 64px rgba(56,189,248,.28)}
.pf img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:50% 16%;display:block}
.col{display:flex;flex-direction:column;align-items:flex-start}
.kick{display:inline-flex;align-items:center;gap:10px;
  font-family:'Space Grotesk';font-weight:700;font-size:17px;letter-spacing:.15em;text-transform:uppercase;
  color:#7fe9ff;border:1.5px solid rgba(56,189,248,.42);border-radius:999px;padding:8px 19px;margin-bottom:22px}
.kick .dot{width:8px;height:8px;border-radius:50%;background:#22d3ee;box-shadow:0 0 14px #22d3ee}
.h1{font-family:'Space Grotesk';font-weight:700;font-size:56px;line-height:1.0;letter-spacing:-.025em;color:#e8ecf6}
.h1 b{background:linear-gradient(115deg,#22d3ee,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{font-family:'Space Grotesk';font-weight:700;font-size:27px;color:#9fb4e0;margin-top:12px;letter-spacing:.005em}
.body{margin-top:22px;color:#aeb9d0;font-size:22px;font-weight:500;line-height:1.46;max-width:560px}
.body b{color:#e8ecf6;font-weight:600}
.foot{display:flex;align-items:center;gap:14px;margin-top:30px}
.foot .pill{font-family:'Space Grotesk';font-weight:700;color:#7fe9ff;border:1px solid rgba(56,189,248,.34);
  border-radius:999px;padding:6px 16px;font-size:15px;letter-spacing:.1em;text-transform:uppercase}
.foot .url{font-family:'Space Grotesk';font-weight:700;font-size:22px;color:#e8ecf6}
</style></head>
<body>
<div class="b" id="banner">
  <div class="grid"></div>
  <div class="aur a1"></div><div class="aur a2"></div><div class="aur a3"></div>
  <div class="wrap">
    <span class="pf"><img src="owner.jpg" alt=""></span>
    <div class="col">
      <span class="kick"><span class="dot"></span>Cereblix &middot; Meet the Owner</span>
      <div class="h1">Emil <b>Biktimirov</b></div>
      <div class="tag">Developer &amp; Owner &middot; Age 26</div>
      <div class="body">A chance to get to know each other - and <b>one more reason to believe</b> in the project and its long-term future.</div>
      <div class="foot"><span class="pill">Today</span><span class="url">cereblix.com</span></div>
    </div>
  </div>
</div>
</body></html>
