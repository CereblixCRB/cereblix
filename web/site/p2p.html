<style>
  :root{--bg:#070a14;--card:#101524;--card2:#161d30;--line:rgba(125,145,200,.16);--txt:#e9edfb;--mut:#8a97bd;--dim:#5e6a8c;--acc:#6d8bff;--acc2:#a974ff;--grad:linear-gradient(135deg,#6d8bff,#a974ff);--ok:#2fd6a0;--warn:#ffc23d;--err:#ff6b7d;--radius:16px;--shadow:0 18px 50px -20px rgba(0,0,0,.7)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font:15px/1.55 -apple-system,Segoe UI,Roboto,Inter,sans-serif;background-image:radial-gradient(900px 500px at 82% -8%,rgba(169,116,255,.18),transparent 60%),radial-gradient(800px 500px at 8% 4%,rgba(109,139,255,.16),transparent 55%);background-attachment:fixed;-webkit-font-smoothing:antialiased}
  a{color:var(--acc);text-decoration:none}.wrap{max-width:1040px;margin:0 auto;padding:22px 18px 70px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:4px 2px 22px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:750;font-size:19px}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;box-shadow:0 8px 24px -8px rgba(109,139,255,.7)}
  .brand small{display:block;font-size:11px;font-weight:600;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:-2px}
  .hgroup{display:flex;align-items:center;gap:10px}
  .chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--mut);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:999px;padding:6px 13px}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--dim)}.chip.on .dot{background:var(--ok);box-shadow:0 0 10px var(--ok)}
  .card{background:linear-gradient(180deg,rgba(22,29,48,.85),rgba(13,17,28,.9));border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
  .card h2{margin:0 0 4px;font-size:17px}
  h3{margin:0 0 12px;font-size:11.5px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:1.1px}
  button{font:inherit;font-weight:650;cursor:pointer;border:0;border-radius:11px;padding:10px 16px;color:#0a1430;background:var(--grad);transition:transform .12s,box-shadow .2s,background .2s,opacity .2s;box-shadow:0 10px 24px -12px rgba(109,139,255,.8)}
  button:hover{transform:translateY(-1.5px);box-shadow:0 16px 30px -12px rgba(140,120,255,.9)}button:active{transform:translateY(0)}
  button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
  button.ghost{background:rgba(255,255,255,.04);color:var(--txt);border:1px solid var(--line);box-shadow:none}button.ghost:hover{background:rgba(255,255,255,.09);border-color:rgba(140,160,220,.35)}
  button.ok{background:linear-gradient(135deg,#2fd6a0,#22b3c9);color:#042018}button.warn{background:linear-gradient(135deg,#ffc23d,#ff9b3d);color:#2a1900}
  button.danger{background:rgba(255,107,125,.12);color:#ffb3bd;border:1px solid rgba(255,107,125,.4);box-shadow:none}
  button.mini{padding:6px 11px;font-size:12.5px;border-radius:9px}
  label{display:block;font-size:11.5px;color:var(--mut);margin:12px 0 6px;font-weight:600}
  input,select{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:11px 13px;font:inherit;transition:border .15s,box-shadow .15s}
  input::placeholder{color:var(--dim)}input:focus,select:focus{outline:0;border-color:rgba(109,139,255,.7);box-shadow:0 0 0 3px rgba(109,139,255,.18)}
  select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%238a97bd' stroke-width='1.6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 13px center;padding-right:34px}
  .grid{display:grid;gap:14px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.grow{flex:1;min-width:0}
  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:5px;margin-bottom:18px;flex-wrap:wrap}
  .tabs button{background:transparent;color:var(--mut);box-shadow:none;border-radius:10px;font-weight:650;padding:9px 15px}.tabs button:hover{color:var(--txt);transform:none}
  .tabs button.active{background:var(--grad);color:#0a1430;box-shadow:0 8px 20px -10px rgba(109,139,255,.8)}
  table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px 8px;border-bottom:1px solid var(--line);font-size:13.5px}
  th{color:var(--mut);font-weight:650;font-size:11.5px;text-transform:uppercase;letter-spacing:.6px}
  tbody tr{transition:background .12s}tbody tr:hover{background:rgba(255,255,255,.025)}td.empty{color:var(--dim);text-align:center;padding:26px}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
  .tag.crb{color:#a9c2ff;border-color:rgba(70,110,210,.5);background:rgba(70,110,210,.1)}.tag.usdt{color:#7fe7bd;border-color:rgba(47,160,120,.45);background:rgba(47,160,120,.1)}
  .state{font-weight:700;font-size:12.5px;display:inline-flex;align-items:center;gap:6px}.state::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor}
  .s-AWAITING_CRB,.s-funding{color:var(--acc2)}.s-AWAITING_USDT,.s-BOTH_FUNDED_AWAITING_ADMIN{color:var(--warn)}.s-RELEASING{color:var(--acc)}
  .s-COMPLETED,.s-open{color:var(--ok)}.s-EXPIRED,.s-REFUNDED,.s-cancelled,.s-taken{color:var(--dim)}
  .muted{color:var(--mut)}.dim{color:var(--dim)}.small{font-size:12.5px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12.5px;word-break:break-all}.hide{display:none!important}
  .gate{max-width:460px;margin:8vh auto;text-align:center}.gate .logo-lg{width:58px;height:58px;border-radius:16px;background:var(--grad);margin:0 auto 14px;display:grid;place-items:center;box-shadow:0 16px 40px -12px rgba(140,120,255,.8)}.gate p{color:var(--mut)}
  .stack{display:flex;flex-direction:column;gap:10px;margin-top:18px}.stack button{width:100%;padding:13px}.or{display:flex;align-items:center;gap:12px;color:var(--dim);font-size:12px;margin:6px 0}.or::before,.or::after{content:'';flex:1;height:1px;background:var(--line)}
  .legs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}@media(max-width:680px){.legs{grid-template-columns:1fr}}
  .leg{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:15px}.leg.funded{border-color:rgba(47,214,160,.5);box-shadow:inset 0 0 0 1px rgba(47,214,160,.2)}.leg.pending{border-color:rgba(169,116,255,.5)}.leg.idle{opacity:.5}
  .leg .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .copyrow{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-top:8px}
  .progress{height:6px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;margin:14px 0 2px}.progress i{display:block;height:100%;background:var(--grad);transition:width .5s ease}
  .pulse{animation:pulse 1.4s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}.seg button{background:transparent;color:var(--mut);box-shadow:none;border-radius:9px;padding:9px 18px}.seg button:hover{transform:none;color:var(--txt)}
  .seg button.on.auto{background:linear-gradient(135deg,#2fd6a0,#22b3c9);color:#042018}.seg button.on.semi{background:linear-gradient(135deg,#ffc23d,#ff9b3d);color:#2a1900}
  .seg.lang{padding:3px;border-radius:10px}.seg.lang button{padding:5px 11px;font-size:12px;border-radius:7px;font-weight:700}.seg.lang button.on{background:var(--grad);color:#0a1430}
  #toasts{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:10px;z-index:60}
  .toast{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:12px;padding:12px 16px;box-shadow:var(--shadow);min-width:220px;max-width:340px;animation:slin .25s ease;font-size:13.5px}.toast.err{border-left-color:var(--err)}.toast.ok{border-left-color:var(--ok)}@keyframes slin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  #ov{position:fixed;inset:0;background:rgba(4,6,14,.66);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}#ov.show{display:flex}
  .modal{background:linear-gradient(180deg,#161d30,#0f1422);border:1px solid var(--line);border-radius:18px;padding:22px;width:100%;max-width:460px;box-shadow:var(--shadow);animation:pop .2s ease}@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}.modal h2{margin:0 0 4px;font-size:17px}
  .notice{background:rgba(169,116,255,.08);border:1px solid rgba(169,116,255,.28);color:#cdbcff;border-radius:12px;padding:10px 14px;font-size:12.5px}

<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 3c0 5 12 5 12 10S6 17 6 21M18 3c0 5-12 5-12 10s12 5 12 8" stroke="#0a1430" stroke-width="2" stroke-linecap="round"/></svg></span><span>Cereblix<small data-i18n="subtitle">P2P Exchange</small></span></div>
    <div class="hgroup"><div class="seg lang"><button id="lg_en" onclick="setLang('en')">EN</button><button id="lg_ru" onclick="setLang('ru')">RU</button></div><div id="who" class="chip"><span class="dot"></span><span id="whoTxt">offline</span></div></div>
  </header>

  <div id="gate" class="card gate">
    <div class="logo-lg"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M6 3c0 5 12 5 12 10S6 17 6 21M18 3c0 5-12 5-12 10s12 5 12 8" stroke="#0a1430" stroke-width="2" stroke-linecap="round"/></svg></div>
    <h2 data-i18n="gate_title">Sign in to the P2P exchange</h2>
    <p class="small" data-i18n="gate_desc"></p>
    <div class="stack"><button onclick="genAndLogin()" data-i18n="gate_create">Create a test wallet & sign in</button><button class="ghost" onclick="importLogin()" data-i18n="gate_import">Import seed (hex)</button></div>
    <div class="or" data-i18n="gate_demo">operator demo</div>
    <button class="ghost" style="width:100%" onclick="login(ADMIN_SEED)" data-i18n="gate_admin">★ Sign in as Admin</button>
    <div id="gateMsg" class="small" style="margin-top:12px;color:var(--err)"></div>
  </div>

  <div id="app" class="hide">
    <div class="tabs">
      <button data-tab="offers" class="active" onclick="tab('offers')" data-i18n="tab_offers">Offers</button>
      <button data-tab="myoffers" onclick="tab('myoffers')" data-i18n="tab_myoffers">My offers</button>
      <button data-tab="mine" onclick="tab('mine')" data-i18n="tab_mine">My trades</button>
      <button id="adminTabBtn" data-tab="admin" class="hide" onclick="tab('admin')" data-i18n="tab_admin">★ Admin</button>
      <span class="grow"></span><button class="ghost" onclick="logout()" data-i18n="logout">Sign out</button>
    </div>

    <div id="tab-offers">
      <div class="card">
        <h3 data-i18n="create_offer">Create offer</h3>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">
          <div><label data-i18n="f_want">I want to</label><select id="o_side"><option value="sell_crb" data-i18n="opt_sell">Sell CRB for USDT</option><option value="buy_crb" data-i18n="opt_buy">Buy CRB for USDT</option></select></div>
          <div><label data-i18n="f_net">USDT network</label><select id="o_rail"><option value="polygon">USDT · Polygon</option><option value="solana">USDT · Solana</option></select></div>
        </div>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-top:2px">
          <div><label data-i18n="f_amount">Amount, CRB</label><input id="o_amount" type="number" min="0.01" step="0.01" value="10" oninput="offerHint()"></div>
          <div><label data-i18n="f_price">Price, USDT per 1 CRB</label><input id="o_price" type="number" min="0.0001" step="0.0001" value="1.00" oninput="offerHint()"></div>
        </div>
        <div id="o_usdtWrap"><label id="o_usdtLabel" data-i18n="f_usdt_recv">Address to receive USDT</label><input id="o_usdt" class="mono" data-i18n-ph="ph_usdt"></div>
        <div class="row" style="margin-top:16px"><button onclick="createOffer()" data-i18n="btn_publish">Publish offer</button><span id="o_hint" class="small dim"></span></div>
      </div>
      <div class="card"><h3 data-i18n="open_offers">Open offers</h3>
        <table><thead><tr><th data-i18n="th_side">Side</th><th data-i18n="th_net">Network</th><th data-i18n="th_amount">Amount</th><th data-i18n="th_price">Price</th><th data-i18n="th_total">Total USDT</th><th></th></tr></thead><tbody id="offers"></tbody></table>
      </div>
    </div>

    <div id="tab-trade" class="hide"></div>

    <div id="tab-myoffers" class="hide"><div class="card"><h3 data-i18n="my_offers">My offers</h3>
      <table><thead><tr><th data-i18n="th_side">Side</th><th data-i18n="th_amount">Amount</th><th data-i18n="th_price">Price</th><th data-i18n="th_status">Status</th><th></th></tr></thead><tbody id="myoffers"></tbody></table></div></div>

    <div id="tab-mine" class="hide"><div class="card"><h3 data-i18n="my_trades">My trades</h3>
      <table><thead><tr><th data-i18n="th_id">ID</th><th data-i18n="th_pair">Pair</th><th>CRB</th><th>USDT</th><th data-i18n="th_status">Status</th><th></th></tr></thead><tbody id="mine"></tbody></table></div></div>

    <div id="tab-admin" class="hide">
      <div class="card"><h3 data-i18n="mode_title">Platform mode</h3>
        <div class="row" style="justify-content:space-between"><div class="seg"><button id="m_auto" class="auto" onclick="setMode('auto')" data-i18n="mode_auto">Auto</button><button id="m_semi" class="semi" onclick="setMode('semi')" data-i18n="mode_semi">Semi-auto</button></div><div class="row" style="gap:8px"><button class="ghost mini" onclick="loadHealth()" data-i18n="health">Gas / health</button><span class="chip"><span data-i18n="mode_current">current:</span> <b id="modeNow" style="color:var(--txt)">—</b></span></div></div>
        <p class="small muted" style="margin:12px 0 0" data-i18n="mode_desc"></p></div>
      <div class="card"><h3 data-i18n="all_trades">All trades</h3>
        <table><thead><tr><th data-i18n="th_id">ID</th><th data-i18n="th_pair">Pair</th><th>CRB</th><th>USDT</th><th data-i18n="th_legs">Legs</th><th data-i18n="th_status">Status</th><th></th></tr></thead><tbody id="adminTrades"></tbody></table></div>
    </div>
  </div>
  <div class="notice" style="margin-top:8px" data-i18n="notice"></div>
</div>

<div id="ov" onclick="if(event.target.id==='ov')closeModal()"><div class="modal" id="modalBox"></div></div>
<div id="toasts"></div>

function t(k){return (I18N[LANG]&&I18N[LANG][k])||I18N.en[k]||k}
function tp(k){let s=t(k);for(let i=1;i<arguments.length;i++)s=s.replace('%'+i,arguments[i]);return s}
function locErr(m){if(ERRMAP[m])return t(ERRMAP[m]);if(m==='network')return LANG==='ru'?'Ошибка сети — проверьте соединение':'Network error — check your connection';if(m&&m.indexOf('slow down')>=0)return LANG==='ru'?'Слишком часто — подождите немного':'Too many requests — slow down';if(m&&m.indexOf('out of range')>=0)return LANG==='ru'?'Значение вне допустимого диапазона':'Value out of allowed range';if(m&&m.indexOf('invalid for this network')>=0)return LANG==='ru'?'Адрес недействителен для этой сети':'Address invalid for this network';if(m&&m.indexOf('too small')>=0)return LANG==='ru'?'Сумма слишком мала':'Amount too small';return m||t('err_bad')}
function stLabel(s){const v=(I18N[LANG]||{})['st_'+s]||I18N.en['st_'+s];return v||s}
function osLabel(s){const v=(I18N[LANG]||{})['os_'+s]||I18N.en['os_'+s];return v||s}
const hex2b=h=>{h=h.trim();const a=new Uint8Array(h.length/2);for(let i=0;i<a.length;i++)a[i]=parseInt(h.substr(i*2,2),16);return a};
const b2hex=b=>Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');

async function api(p,o={}){o.headers=Object.assign({'Content-Type':'application/json'},o.headers||{});if(TOK)o.headers['Authorization']='Bearer '+TOK;let r;try{r=await fetch('/otc'+p,o)}catch(e){throw new Error('network')}const x=await r.text();let j={};try{j=JSON.parse(x)}catch(e){}if(r.status===401&&TOK){logout();throw new Error('challenge expired')}if(!r.ok)throw new Error(j.error||x||('HTTP '+r.status));return j}
function kpFromSeed(h){return nacl.sign.keyPair.fromSeed(hex2b(h))}

async function login(seedHex){try{
  if(typeof nacl==='undefined')throw new Error(LANG==='ru'?'Не загрузилась библиотека кошелька':'Wallet library failed to load');
  if(!/^[0-9a-fA-F]{64}$/.test((seedHex||'').trim()))throw new Error(LANG==='ru'?'Сид должен быть 64 hex-символа':'Seed must be 64 hex chars');
  const kp=kpFromSeed(seedHex);const ch=await api('/challenge');const sig=nacl.sign.detached(new TextEncoder().encode(ch.msg),kp.secretKey);
  const res=await api('/login',{method:'POST',body:JSON.stringify({pub:b2hex(kp.publicKey),nonce:ch.nonce,sig:b2hex(sig)})});
  TOK=res.token;ME=res.addr;IS_ADMIN=res.admin;$('who').className='chip on';setWho();$('gate').classList.add('hide');$('app').classList.remove('hide');$('adminTabBtn').classList.toggle('hide',!IS_ADMIN);closeModal();tab('offers');toast(tp('t_signedin',short(ME)),'ok')
}catch(e){$('gateMsg').textContent=locErr(e.message);tErr(e)}}
function genAndLogin(){const s=new Uint8Array(32);crypto.getRandomValues(s);const h=b2hex(s);openModal(`<h2>${t('gen_title')}</h2><p class="small muted">${t('gen_desc')}</p><div class="copyrow"><span class="mono grow">${h}</span><button class="ghost mini" onclick="copy('${h}')">${t('copy')}</button></div><div class="row" style="margin-top:16px;justify-content:flex-end"><button class="ghost" onclick="closeModal()">${t('cancel')}</button><button onclick="login('${h}')">${t('signin')}</button></div>`)}
function importLogin(){openModal(`<h2>${t('import_title')}</h2><label>${t('import_label')}</label><input id="imp" class="mono" placeholder="abcd…"><div class="row" style="margin-top:16px;justify-content:flex-end"><button class="ghost" onclick="closeModal()">${t('cancel')}</button><button onclick="login($('imp').value.trim())">${t('signin')}</button></div>`)}
function logout(){if(TOK){api('/logout').catch(()=>{})}TOK=ME=null;IS_ADMIN=false;curTrade=null;clearInterval(pollTimer);$('app').classList.add('hide');$('gate').classList.remove('hide');$('who').className='chip';setWho()}

  o.forEach(x=>{OFFERS[x.ID]=x;const side=x.Side==='sell_crb'?t('sells_crb'):t('buys_crb');const tr=document.createElement('tr');tr.innerHTML=`<td><b>${side}</b></td><td><span class="tag usdt">USDT · ${railLabel(x.Rail)}</span></td><td><b>${Number(x.AmountCRB)}</b> CRB</td><td>${Number(x.Price)}</td><td>${Number(x.AmountUSDT).toFixed(2)}</td><td style="text-align:right"><button class="mini" onclick="startTakeId('${esc(x.ID)}')">${t('btn_take')}</button></td>`;tb.appendChild(tr)})}

function crbLeg(tr){const locked=tr.CRBLocked;const cls=locked?'funded':'pending';
  let inner;if(locked){inner=`<span class="state s-COMPLETED">${t('leg_crb_locked')}</span>`}else{inner=`<div class="small muted">${t('leg_send_crb')}</div><div class="copyrow"><span class="mono grow">${esc(tr.EscrowCRB)}</span><button class="ghost mini" onclick="copyPrev(this)">${t('copy')}</button></div><div class="small pulse" style="margin-top:7px;color:var(--acc2)">${t('leg_locking')}</div>`}
  return `<div class="leg ${cls}"><div class="top"><span class="tag crb">CRB</span><span class="small dim">${Number(tr.AmountCRB)} CRB</span></div>${inner}</div>`}
function usdtLeg(tr){const f=tr.USDTFunded;return `<div class="leg ${f?'funded':'pending'}"><div class="top"><span class="tag usdt">USDT · ${railLabel(tr.Rail)}</span>${f?`<span class="state s-COMPLETED">${t('funded')}</span>`:`<span class="small dim">${Number(tr.AmountUSDT).toFixed(6)}</span>`}</div>${f?'':`<div class="small muted">${t('leg_send_usdt')}</div><div class="copyrow"><span class="mono grow">${esc(tr.EscrowUSDT)}</span><button class="ghost mini" onclick="copyPrev(this)">${t('copy')}</button></div>`}</div>`}

    const canApprove=(x.State==='BOTH_FUNDED_AWAITING_ADMIN'||x.State==='RELEASE_RETRY');
    const noneSent=!x.RelCRBTx&&!x.RelUSDTTx;const canRefund=noneSent&&['AWAITING_CRB','AWAITING_USDT','BOTH_FUNDED_AWAITING_ADMIN','RELEASE_RETRY','FAILED_REVIEW','EXPIRED'].includes(x.State);
    const act=(canApprove?`<button class="ok mini" onclick="approve('${esc(x.ID)}')">${t('approve')}</button> `:'')+(canRefund?`<button class="danger mini" onclick="adminRefund('${esc(x.ID)}')">${t('refund')}</button>`:'');
    const tr=document.createElement('tr');tr.innerHTML=`<td class="mono small">${esc(String(x.ID).slice(0,8))}</td><td>CRB · ${railLabel(x.Rail)}</td><td>${Number(x.AmountCRB)}</td><td>${Number(x.AmountUSDT).toFixed(4)}</td><td>${legs}</td><td><span class="state s-${esc(x.State)}">${stLabel(x.State)}</span></td><td style="text-align:right">${act}</td>`;tb.appendChild(tr)})}
async function setMode(m){try{await api('/admin/mode',{method:'POST',body:JSON.stringify({Mode:m})});toast(tp('t_mode',t('mode_'+m)),'ok');loadAdmin()}catch(e){tErr(e)}}
async function approve(id){try{await api('/admin/approve',{method:'POST',body:JSON.stringify({ID:id})});toast(t('t_release'),'ok');setTimeout(loadAdmin,1500)}catch(e){tErr(e)}}
async function adminRefund(id){if(!confirm(t('refund')+'?'))return;try{await api('/admin/refund',{method:'POST',body:JSON.stringify({ID:id})});toast(t('t_refunding'),'ok');setTimeout(loadAdmin,1500)}catch(e){tErr(e)}}
async function loadHealth(){let h;try{h=await api('/admin/health')}catch(e){return tErr(e)}
  const f=(v,d)=>v===undefined?'—':(Number(v)/d).toLocaleString('en',{maximumFractionDigits:6});
  const rows=[['CRB index-0',f(h.crb_index0,1e8)+' CRB'],['Polygon gas',f(h.polygon_gas_index0,1e18)+' POL'],['Polygon USDT',f(h.polygon_usdt_index0,1e6)+' USDT'],['Solana gas',f(h.solana_gas_index0,1e9)+' SOL'],['Solana USDT',f(h.solana_usdt_index0,1e6)+' USDT']];
  openModal(`<h2>${t('health_title')}</h2><p class="small muted" style="margin:0 0 12px">${t('health_desc')}</p>`+rows.map(r=>`<div class="row" style="justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08)"><span class="dim">${esc(r[0])}</span><b class="mono">${esc(String(r[1]))}</b></div>`).join('')+`<div class="row" style="margin-top:16px;justify-content:flex-end"><button onclick="closeModal()">${t('ok_got')}</button></div>`)}
setLang(LANG);
</script>
