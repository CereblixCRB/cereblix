MINER_NAME=xmrig-cereblix

# Bump CUSTOM_VERSION/CUSTOM_BUILD to make Hive OS re-pull the package (1.1 build 2
# = the fully-static, dependency-free binary: no libssl.so.3/libuv.so.1 needed).
CUSTOM_VERSION=1.1
CUSTOM_BUILD=2

CUSTOM_CONFIG_FILENAME=$MINER_DIR/$CUSTOM_MINER/config.json

CUSTOM_LOG_BASENAME=/var/log/miner/custom/$MINER_NAME

MINER_API_PORT=60070

LIBCURL3_COMPAT=0
